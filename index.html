<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Engine v5.0 | Deep Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="scroll-height"></div>

    <div class="hud-top">
        <div class="system-status">
            <span class="glitch" data-text="NEBULA_OS">NEBULA_OS</span>
            <div class="line"></div>
            <p>VECTORIAL RENDERING: ACTIVE</p>
        </div>
    </div>

    <div class="hud-bottom">
        <div class="coord-box">X: <span id="val-x">0</span></div>
        <div class="coord-box">Y: <span id="val-y">0</span></div>
        <div class="coord-box">Z: <span id="val-z">0</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
